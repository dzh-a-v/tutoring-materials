<!DOCTYPE html>
<html lang="en-GB"><head><meta charset="UTF-8" />
<title>Milana's Maths Adventure</title>
<style>/* ============== Milana's Maths Adventure ============== */

@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700;9..144,900&family=Nunito:wght@400;600;700;800&display=swap');

:root {
  --cream: #faf4e8;
  --cream-deep: #f3e9d2;
  --cream-warm: #f7ecd5;
  --ink: #2b2118;
  --ink-soft: #4a3c2e;
  --polar-blue: #b9d6e8;
  --polar-blue-deep: #7eaecb;
  --ice: #e6f0f6;
  --panda-pink: #f4c2c0;
  --panda-pink-deep: #d99794;
  --gold: #e8b94e;
  --leaf: #8aaa6a;
  --berry: #b85c5c;
  --shadow: 0 12px 32px rgba(60, 40, 20, 0.12);
  --shadow-soft: 0 6px 18px rgba(60, 40, 20, 0.08);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%;
  height: 100%;
  background: #1a1410;
  font-family: 'Nunito', system-ui, sans-serif;
  color: var(--ink);
  overflow: hidden;
}

deck-stage > section {
  width: 1920px;
  height: 1080px;
  background: var(--cream);
  position: relative;
  overflow: hidden;
  font-family: 'Nunito', sans-serif;
  color: var(--ink);
}

/* paper / snow texture overlay */
deck-stage > section::before {
  content: '';
  position: absolute; inset: 0;
  background-image:
    radial-gradient(circle at 20% 30%, rgba(255,255,255,0.4) 1px, transparent 1.5px),
    radial-gradient(circle at 70% 80%, rgba(60,40,20,0.04) 1px, transparent 1.5px),
    radial-gradient(circle at 45% 55%, rgba(255,255,255,0.3) 1px, transparent 1.5px);
  background-size: 80px 80px, 120px 120px, 100px 100px;
  pointer-events: none;
  z-index: 1;
}

deck-stage > section > * {
  position: relative;
  z-index: 2;
}

/* ============== TYPE ============== */
h1, h2, h3 { font-family: 'Fraunces', serif; font-weight: 700; letter-spacing: -0.01em; line-height: 1.05; }

.kicker {
  font-family: 'Nunito', sans-serif;
  font-weight: 700;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  font-size: 26px;
  color: var(--ink-soft);
  opacity: 0.7;
}

.title { font-size: 110px; font-weight: 900; line-height: 1; }
.subtitle { font-size: 44px; font-family: 'Fraunces', serif; font-weight: 500; font-style: italic; line-height: 1.2; color: var(--ink-soft); }
.body-big { font-size: 38px; line-height: 1.4; max-width: 1100px; }
.body { font-size: 32px; line-height: 1.45; max-width: 1100px; }
.handwritten { font-family: 'Fraunces', serif; font-style: italic; font-weight: 500; }

/* ============== BACKGROUND VARIANTS ============== */
.bg-snow { background: linear-gradient(180deg, #eaf3f9 0%, #f5f0e2 70%, #f8eccf 100%); }
.bg-bakery { background: linear-gradient(180deg, #fbe8c8 0%, #f7d9a5 100%); }
.bg-night { background: linear-gradient(180deg, #2a3f57 0%, #4a6079 100%); color: #fff5e0; }
.bg-cream { background: var(--cream); }
.bg-mint { background: linear-gradient(180deg, #e0ecdf 0%, #d4e3d2 100%); }

.bg-night h1, .bg-night h2, .bg-night .subtitle { color: #fff5e0; }

/* ============== LAYOUTS ============== */
.slide-pad { padding: 100px 120px; }
.slide-flex { display: flex; flex-direction: column; height: 100%; }
.slide-center {
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
}
.slide-grid-2 {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 80px;
  height: 100%;
  align-items: center;
  padding: 100px 120px;
}

/* ============== CARDS ============== */
.card {
  background: #fffaf0;
  border-radius: 36px;
  padding: 60px;
  box-shadow: var(--shadow);
  border: 3px solid rgba(60,40,20,0.06);
}
.card-warm { background: var(--cream-warm); }
.card-blue { background: var(--ice); border-color: var(--polar-blue); }

/* ============== COLUMN MATH ============== */
.column-math {
  font-family: 'Fraunces', serif;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
  display: inline-grid;
  grid-template-columns: 80px repeat(var(--cols, 3), 140px);
  row-gap: 8px;
  align-items: center;
  font-size: 130px;
  line-height: 1;
}
.column-math .op { font-size: 110px; text-align: right; padding-right: 16px; color: var(--ink-soft); }
.column-math .digit { text-align: center; }
.column-math .digit.h { color: #b85c5c; }
.column-math .digit.t { color: #6a8fb0; }
.column-math .digit.o { color: #4a7a4a; }
.column-math .rule {
  grid-column: 1 / -1;
  height: 6px;
  background: var(--ink);
  border-radius: 3px;
  margin: 10px 0;
}
.column-math .answer { font-weight: 900; }

.column-math .carry-tiny {
  font-size: 44px;
  text-align: center;
  font-weight: 700;
  color: var(--berry);
  height: 60px;
  line-height: 1;
}
.column-math .strike {
  position: relative;
}
.column-math .strike::after {
  content: '';
  position: absolute;
  left: 8%; right: 8%;
  top: 52%;
  height: 8px;
  background: var(--berry);
  border-radius: 4px;
  transform: rotate(-12deg);
}
.column-math .borrowed {
  font-size: 56px;
  color: var(--berry);
  font-weight: 800;
  height: 70px;
  line-height: 1;
  text-align: center;
}
.column-math .ghost {
  visibility: hidden;
}

/* place value column headers */
.pv-headers {
  display: inline-grid;
  grid-template-columns: 80px repeat(var(--cols, 3), 140px);
  font-family: 'Nunito', sans-serif;
  font-weight: 700;
  font-size: 26px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--ink-soft);
  text-align: center;
  margin-bottom: 12px;
}
.pv-headers .h-h { color: #b85c5c; }
.pv-headers .h-t { color: #6a8fb0; }
.pv-headers .h-o { color: #4a7a4a; }

/* ============== STARS ============== */
.stars {
  position: absolute;
  display: flex;
  gap: 16px;
  font-size: 80px;
  pointer-events: none;
}
.stars span { animation: pop 0.6s ease-out backwards; }
.stars span:nth-child(1) { animation-delay: 0s; }
.stars span:nth-child(2) { animation-delay: 0.1s; }
.stars span:nth-child(3) { animation-delay: 0.2s; }
.stars span:nth-child(4) { animation-delay: 0.3s; }
.stars span:nth-child(5) { animation-delay: 0.4s; }

@keyframes pop {
  0% { transform: scale(0) rotate(-30deg); opacity: 0; }
  60% { transform: scale(1.3) rotate(10deg); opacity: 1; }
  100% { transform: scale(1) rotate(0deg); opacity: 1; }
}

/* ============== BUN / FISH / BLOCK GROUPS ============== */
.tray {
  display: inline-grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 8px;
  padding: 16px;
  background: #d8a978;
  border-radius: 16px;
  border: 4px solid #a87545;
  box-shadow: var(--shadow-soft);
}
.tray.empty .bun { opacity: 0.18; }
.bun {
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 30%, #f5d29a, #c98c4a 70%, #8a5a28);
  box-shadow: inset -3px -4px 6px rgba(80,40,10,0.3), 0 2px 0 rgba(0,0,0,0.08);
  position: relative;
}
.bun::after {
  content: '';
  position: absolute;
  top: 18%; left: 25%;
  width: 30%; height: 8%;
  background: rgba(255,240,200,0.5);
  border-radius: 50%;
  transform: rotate(-15deg);
}

/* single bun (one) */
.single-bun {
  display: inline-flex;
  align-items: center;
  justify-content: center;
}

/* fish "ten" basket */
.basket-ten {
  width: 140px;
  height: 100px;
  background: linear-gradient(180deg, #c89060 0%, #9a6a3e 100%);
  border-radius: 0 0 50% 50% / 0 0 60% 60%;
  border: 4px solid #6e4a28;
  position: relative;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding-top: 8px;
}
.basket-ten::before {
  content: '';
  position: absolute;
  top: -4px; left: -4px; right: -4px;
  height: 16px;
  background: #6e4a28;
  border-radius: 8px;
}
.basket-ten .label {
  font-family: 'Fraunces', serif;
  font-weight: 800;
  font-size: 38px;
  color: #fff5e0;
  margin-top: 28px;
}

/* ============== PANDA / POLAR BEAR ILLUSTRATIONS ============== */
.character { position: absolute; pointer-events: none; }

/* ============== SPEECH BUBBLE ============== */
.bubble {
  background: #fffaf0;
  border: 3px solid var(--ink);
  border-radius: 32px;
  padding: 24px 32px;
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-weight: 500;
  font-size: 30px;
  line-height: 1.35;
  position: relative;
  box-shadow: var(--shadow-soft);
  max-width: 480px;
}
.bubble::after {
  content: '';
  position: absolute;
  bottom: -22px;
  left: 60px;
  width: 30px; height: 30px;
  background: #fffaf0;
  border-right: 3px solid var(--ink);
  border-bottom: 3px solid var(--ink);
  transform: rotate(45deg);
}
.bubble.right::after { left: auto; right: 60px; }
.bubble.up::after { bottom: auto; top: -22px; transform: rotate(-135deg); }

/* ============== PROGRESS DOTS ============== */
.progress {
  position: absolute;
  bottom: 36px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 10px;
  z-index: 5;
  opacity: 0.4;
}
.progress-dot {
  width: 12px; height: 12px;
  border-radius: 50%;
  background: var(--ink);
  opacity: 0.3;
}
.progress-dot.active { opacity: 1; background: var(--berry); }

/* ============== LABELS ============== */
.label-pill {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  padding: 12px 28px;
  border-radius: 999px;
  font-family: 'Nunito', sans-serif;
  font-weight: 800;
  font-size: 26px;
  background: var(--cream-warm);
  border: 3px solid var(--ink);
}

/* color tags for hundreds/tens/ones */
.tag-h { background: #f6d5d5; color: #6a2828; border-color: #b85c5c; }
.tag-t { background: #cfe1ee; color: #244660; border-color: #6a8fb0; }
.tag-o { background: #d8e8c8; color: #2c4a2c; border-color: #4a7a4a; }

/* ============== STEP NUMBER BUBBLE ============== */
.step-num {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 72px; height: 72px;
  border-radius: 50%;
  background: var(--gold);
  color: var(--ink);
  font-family: 'Fraunces', serif;
  font-weight: 800;
  font-size: 42px;
  border: 4px solid var(--ink);
  box-shadow: 4px 4px 0 var(--ink);
  flex-shrink: 0;
}

/* a wobbly arrow */
.arrow-down {
  width: 4px;
  height: 60px;
  background: var(--berry);
  position: relative;
  margin: 0 auto;
}
.arrow-down::after {
  content: '';
  position: absolute;
  bottom: -2px; left: 50%;
  width: 18px; height: 18px;
  border-right: 4px solid var(--berry);
  border-bottom: 4px solid var(--berry);
  transform: translateX(-50%) rotate(45deg);
}

/* gentle floaters */
.snowflake {
  position: absolute;
  color: rgba(255,255,255,0.7);
  font-size: 24px;
  pointer-events: none;
}
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script>/**
 * <deck-stage> — reusable web component for HTML decks.
 *
 * Handles:
 *  (a) speaker notes — reads <script type="application/json" id="speaker-notes">
 *      and posts {slideIndexChanged: N} to the parent window on nav.
 *  (b) keyboard navigation — ←/→, PgUp/PgDn, Space, Home/End, number keys.
 *  (c) press R to reset to slide 0 (with a tasteful keyboard hint).
 *  (d) bottom-center overlay showing slide count + hints, fades out on idle.
 *  (e) auto-scaling — inner canvas is a fixed design size (default 1920×1080)
 *      scaled with `transform: scale()` to fit the viewport, letterboxed.
 *      Set the `noscale` attribute to render at authored size (1:1) — the
 *      PPTX exporter sets this so its DOM capture sees unscaled geometry.
 *  (f) print — `@media print` lays every slide out as its own page at the
 *      design size, so the browser's Print → Save as PDF produces a clean
 *      one-page-per-slide PDF with no extra setup.
 *
 * Slides are HIDDEN, not unmounted. Non-active slides stay in the DOM with
 * `visibility: hidden` + `opacity: 0`, so their state (videos, iframes,
 * form inputs, React trees) is preserved across navigation.
 *
 * Lifecycle event — the component dispatches a `slidechange` CustomEvent on
 * itself whenever the active slide changes (including the initial mount).
 * The event bubbles and composes out of shadow DOM, so you can listen on
 * the <deck-stage> element or on document:
 *
 *   document.querySelector('deck-stage').addEventListener('slidechange', (e) => {
 *     e.detail.index         // new 0-based index
 *     e.detail.previousIndex // previous index, or -1 on init
 *     e.detail.total         // total slide count
 *     e.detail.slide         // the new active slide element
 *     e.detail.previousSlide // the prior slide element, or null on init
 *     e.detail.reason        // 'init' | 'keyboard' | 'click' | 'tap' | 'api'
 *   });
 *
 * Persistence: none at the deck level. The host app keeps the current slide
 * in its own URL (?slide=) and re-delivers it via location.hash on load, so a
 * bare load with no hash always starts at slide 1.
 *
 * Usage:
 *   <deck-stage width="1920" height="1080">
 *     <section data-label="Title">...</section>
 *     <section data-label="Agenda">...</section>
 *   </deck-stage>
 *
 * Slides are the direct element children of <deck-stage>. Each slide is
 * automatically tagged with:
 *   - data-screen-label="NN Label"   (1-indexed, for comment flow)
 *   - data-om-validate="no_overflowing_text,no_overlapping_text,slide_sized_text"
 */

(() => {
  const DESIGN_W_DEFAULT = 1920;
  const DESIGN_H_DEFAULT = 1080;
  const OVERLAY_HIDE_MS = 1800;
  const VALIDATE_ATTR = 'no_overflowing_text,no_overlapping_text,slide_sized_text';

  const pad2 = (n) => String(n).padStart(2, '0');

  const stylesheet = `
    :host {
      position: fixed;
      inset: 0;
      display: block;
      background: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Helvetica, Arial, sans-serif;
      overflow: hidden;
    }

    .stage {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .canvas {
      position: relative;
      transform-origin: center center;
      flex-shrink: 0;
      background: #fff;
      will-change: transform;
    }

    /* Slides live in light DOM (via <slot>) so authored CSS still applies.
       We absolutely position each slotted child to stack them. */
    ::slotted(*) {
      position: absolute !important;
      inset: 0 !important;
      width: 100% !important;
      height: 100% !important;
      box-sizing: border-box !important;
      overflow: hidden;
      opacity: 0;
      pointer-events: none;
      visibility: hidden;
    }
    ::slotted([data-deck-active]) {
      opacity: 1;
      pointer-events: auto;
      visibility: visible;
    }

    /* Tap zones for mobile — back/forward thirds like Stories.
       Transparent, no visible UI, don't block the overlay. */
    .tapzones {
      position: fixed;
      inset: 0;
      display: flex;
      z-index: 2147482000;
      pointer-events: none;
    }
    .tapzone {
      flex: 1;
      pointer-events: auto;
      -webkit-tap-highlight-color: transparent;
    }
    /* Only activate tap zones on coarse pointers (touch devices). */
    @media (hover: hover) and (pointer: fine) {
      .tapzones { display: none; }
    }

    .overlay {
      position: fixed;
      left: 50%;
      bottom: 22px;
      transform: translate(-50%, 6px) scale(0.92);
      filter: blur(6px);
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 4px;
      background: #000;
      color: #fff;
      border-radius: 999px;
      font-size: 12px;
      font-feature-settings: "tnum" 1;
      letter-spacing: 0.01em;
      opacity: 0;
      pointer-events: none;
      transition: opacity 260ms ease, transform 260ms cubic-bezier(.2,.8,.2,1), filter 260ms ease;
      transform-origin: center bottom;
      z-index: 2147483000;
      user-select: none;
    }
    .overlay[data-visible] {
      opacity: 1;
      pointer-events: auto;
      transform: translate(-50%, 0) scale(1);
      filter: blur(0);
    }

    .btn {
      appearance: none;
      -webkit-appearance: none;
      background: transparent;
      border: 0;
      margin: 0;
      padding: 0;
      color: inherit;
      font: inherit;
      cursor: default;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: 28px;
      min-width: 28px;
      border-radius: 999px;
      color: rgba(255,255,255,0.72);
      transition: background 140ms ease, color 140ms ease;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:hover { background: rgba(255,255,255,0.12); color: #fff; }
    .btn:active { background: rgba(255,255,255,0.18); }
    .btn:focus { outline: none; }
    .btn:focus-visible { outline: none; }
    .btn::-moz-focus-inner { border: 0; }
    .btn svg { width: 14px; height: 14px; display: block; }
    .btn.reset {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.02em;
      padding: 0 10px 0 12px;
      gap: 6px;
      color: rgba(255,255,255,0.72);
    }
    .btn.reset .kbd {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 16px;
      height: 16px;
      padding: 0 4px;
      font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      font-size: 10px;
      line-height: 1;
      color: rgba(255,255,255,0.88);
      background: rgba(255,255,255,0.12);
      border-radius: 4px;
    }

    .count {
      font-variant-numeric: tabular-nums;
      color: #fff;
      font-weight: 500;
      padding: 0 8px;
      min-width: 42px;
      text-align: center;
      font-size: 12px;
    }
    .count .sep { color: rgba(255,255,255,0.45); margin: 0 3px; font-weight: 400; }
    .count .total { color: rgba(255,255,255,0.55); }

    .divider {
      width: 1px;
      height: 14px;
      background: rgba(255,255,255,0.18);
      margin: 0 2px;
    }

    /* ── Print: one page per slide, no chrome ────────────────────────────
       The screen layout stacks every slide at inset:0 inside a scaled
       canvas; for print we want them in document flow at the authored
       design size so the browser paginates one slide per sheet. The
       @page size is set from the width/height attributes via the inline
       <style id="deck-stage-print-page"> that connectedCallback injects
       into <head> (the @page at-rule has no effect inside shadow DOM). */
    @media print {
      :host {
        position: static;
        inset: auto;
        background: none;
        overflow: visible;
        color: inherit;
      }
      .stage { position: static; display: block; }
      .canvas {
        transform: none !important;
        width: auto !important;
        height: auto !important;
        background: none;
        will-change: auto;
      }
      ::slotted(*) {
        position: relative !important;
        inset: auto !important;
        width: var(--deck-design-w) !important;
        height: var(--deck-design-h) !important;
        box-sizing: border-box !important;
        opacity: 1 !important;
        visibility: visible !important;
        pointer-events: auto;
        break-after: page;
        page-break-after: always;
        break-inside: avoid;
        overflow: hidden;
      }
      ::slotted(*:last-child) {
        break-after: auto;
        page-break-after: auto;
      }
      .overlay, .tapzones { display: none !important; }
    }
  `;

  class DeckStage extends HTMLElement {
    static get observedAttributes() { return ['width', 'height', 'noscale']; }

    constructor() {
      super();
      this._root = this.attachShadow({ mode: 'open' });
      this._index = 0;
      this._slides = [];
      this._notes = [];
      this._hideTimer = null;
      this._mouseIdleTimer = null;

      this._onKey = this._onKey.bind(this);
      this._onResize = this._onResize.bind(this);
      this._onSlotChange = this._onSlotChange.bind(this);
      this._onMouseMove = this._onMouseMove.bind(this);
      this._onTapBack = this._onTapBack.bind(this);
      this._onTapForward = this._onTapForward.bind(this);
    }

    get designWidth() {
      return parseInt(this.getAttribute('width'), 10) || DESIGN_W_DEFAULT;
    }
    get designHeight() {
      return parseInt(this.getAttribute('height'), 10) || DESIGN_H_DEFAULT;
    }

    connectedCallback() {
      this._render();
      this._loadNotes();
      this._syncPrintPageRule();
      window.addEventListener('keydown', this._onKey);
      window.addEventListener('resize', this._onResize);
      window.addEventListener('mousemove', this._onMouseMove, { passive: true });
      // Initial collection + layout happens via slotchange, which fires on mount.
    }

    disconnectedCallback() {
      window.removeEventListener('keydown', this._onKey);
      window.removeEventListener('resize', this._onResize);
      window.removeEventListener('mousemove', this._onMouseMove);
      if (this._hideTimer) clearTimeout(this._hideTimer);
      if (this._mouseIdleTimer) clearTimeout(this._mouseIdleTimer);
    }

    attributeChangedCallback() {
      if (this._canvas) {
        this._canvas.style.width = this.designWidth + 'px';
        this._canvas.style.height = this.designHeight + 'px';
        this._canvas.style.setProperty('--deck-design-w', this.designWidth + 'px');
        this._canvas.style.setProperty('--deck-design-h', this.designHeight + 'px');
        this._fit();
        this._syncPrintPageRule();
      }
    }

    _render() {
      const style = document.createElement('style');
      style.textContent = stylesheet;

      const stage = document.createElement('div');
      stage.className = 'stage';

      const canvas = document.createElement('div');
      canvas.className = 'canvas';
      canvas.style.width = this.designWidth + 'px';
      canvas.style.height = this.designHeight + 'px';
      canvas.style.setProperty('--deck-design-w', this.designWidth + 'px');
      canvas.style.setProperty('--deck-design-h', this.designHeight + 'px');

      const slot = document.createElement('slot');
      slot.addEventListener('slotchange', this._onSlotChange);
      canvas.appendChild(slot);
      stage.appendChild(canvas);

      // Tap zones (mobile): left third = back, right third = forward.
      const tapzones = document.createElement('div');
      tapzones.className = 'tapzones export-hidden';
      tapzones.setAttribute('aria-hidden', 'true');
      tapzones.setAttribute('data-noncommentable', '');
      const tzBack = document.createElement('div');
      tzBack.className = 'tapzone tapzone--back';
      const tzMid = document.createElement('div');
      tzMid.className = 'tapzone tapzone--mid';
      tzMid.style.pointerEvents = 'none';
      const tzFwd = document.createElement('div');
      tzFwd.className = 'tapzone tapzone--fwd';
      tzBack.addEventListener('click', this._onTapBack);
      tzFwd.addEventListener('click', this._onTapForward);
      tapzones.append(tzBack, tzMid, tzFwd);

      // Overlay: compact, solid black, with clickable controls.
      const overlay = document.createElement('div');
      overlay.className = 'overlay export-hidden';
      overlay.setAttribute('role', 'toolbar');
      overlay.setAttribute('aria-label', 'Deck controls');
      overlay.setAttribute('data-noncommentable', '');
      overlay.innerHTML = `
        <button class="btn prev" type="button" aria-label="Previous slide" title="Previous (←)">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M10 3L5 8l5 5"/></svg>
        </button>
        <span class="count" aria-live="polite"><span class="current">1</span><span class="sep">/</span><span class="total">1</span></span>
        <button class="btn next" type="button" aria-label="Next slide" title="Next (→)">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 3l5 5-5 5"/></svg>
        </button>
        <span class="divider"></span>
        <button class="btn reset" type="button" aria-label="Reset to first slide" title="Reset (R)">Reset<span class="kbd">R</span></button>
      `;

      overlay.querySelector('.prev').addEventListener('click', () => this._go(this._index - 1, 'click'));
      overlay.querySelector('.next').addEventListener('click', () => this._go(this._index + 1, 'click'));
      overlay.querySelector('.reset').addEventListener('click', () => this._go(0, 'click'));

      this._root.append(style, stage, tapzones, overlay);
      this._canvas = canvas;
      this._slot = slot;
      this._overlay = overlay;
      this._countEl = overlay.querySelector('.current');
      this._totalEl = overlay.querySelector('.total');
    }

    /** @page must live in the document stylesheet — it's a no-op inside
     *  shadow DOM. Inject/update a single <head> style tag so the print
     *  sheet matches the design size and Save-as-PDF yields one slide per
     *  page with no margins. */
    _syncPrintPageRule() {
      const id = 'deck-stage-print-page';
      let tag = document.getElementById(id);
      if (!tag) {
        tag = document.createElement('style');
        tag.id = id;
        document.head.appendChild(tag);
      }
      tag.textContent =
        '@page { size: ' + this.designWidth + 'px ' + this.designHeight + 'px; margin: 0; } ' +
        '@media print { html, body { margin: 0 !important; padding: 0 !important; background: none !important; overflow: visible !important; height: auto !important; } ' +
        '* { -webkit-print-color-adjust: exact; print-color-adjust: exact; } }';
    }

    _onSlotChange() {
      this._collectSlides();
      this._restoreIndex();
      this._applyIndex({ showOverlay: false, broadcast: true, reason: 'init' });
      this._fit();
    }

    _collectSlides() {
      const assigned = this._slot.assignedElements({ flatten: true });
      this._slides = assigned.filter((el) => {
        // Skip template/style/script nodes even if someone slots them.
        const tag = el.tagName;
        return tag !== 'TEMPLATE' && tag !== 'SCRIPT' && tag !== 'STYLE';
      });

      this._slides.forEach((slide, i) => {
        const n = i + 1;
        // Determine a label for comment flow: prefer explicit data-label,
        // then an existing data-screen-label, then first heading, else "Slide".
        let label = slide.getAttribute('data-label');
        if (!label) {
          const existing = slide.getAttribute('data-screen-label');
          if (existing) {
            // Strip any leading number the author may have included.
            label = existing.replace(/^\s*\d+\s*/, '').trim() || existing;
          }
        }
        if (!label) {
          const h = slide.querySelector('h1, h2, h3, [data-title]');
          if (h) label = (h.textContent || '').trim().slice(0, 40);
        }
        if (!label) label = 'Slide';
        slide.setAttribute('data-screen-label', `${pad2(n)} ${label}`);

        // Validation attribute for comment flow / auto-checks.
        if (!slide.hasAttribute('data-om-validate')) {
          slide.setAttribute('data-om-validate', VALIDATE_ATTR);
        }

        slide.setAttribute('data-deck-slide', String(i));
      });

      if (this._totalEl) this._totalEl.textContent = String(this._slides.length || 1);
      if (this._index >= this._slides.length) this._index = Math.max(0, this._slides.length - 1);
    }

    _loadNotes() {
      const tag = document.getElementById('speaker-notes');
      if (!tag) { this._notes = []; return; }
      try {
        const parsed = JSON.parse(tag.textContent || '[]');
        if (Array.isArray(parsed)) this._notes = parsed;
      } catch (e) {
        console.warn('[deck-stage] Failed to parse #speaker-notes JSON:', e);
        this._notes = [];
      }
    }

    _restoreIndex() {
      // The host's ?slide= param is delivered as a #<int> hash (1-indexed) on
      // the iframe src. No hash → slide 1; the deck itself keeps no position
      // state across loads.
      const h = (location.hash || '').match(/^#(\d+)$/);
      if (h) {
        const n = parseInt(h[1], 10) - 1;
        if (n >= 0 && n < this._slides.length) this._index = n;
      }
    }

    _applyIndex({ showOverlay = true, broadcast = true, reason = 'init' } = {}) {
      if (!this._slides.length) return;
      const prev = this._prevIndex == null ? -1 : this._prevIndex;
      const curr = this._index;
      // Keep the iframe's own hash in sync so an in-iframe location.reload()
      // (reload banner path in viewer-handle.ts) lands on the current slide,
      // not the stale deep-link hash from initial load.
      try { history.replaceState(null, '', '#' + (curr + 1)); } catch (e) {}
      this._slides.forEach((s, i) => {
        if (i === curr) s.setAttribute('data-deck-active', '');
        else s.removeAttribute('data-deck-active');
      });
      if (this._countEl) this._countEl.textContent = String(curr + 1);

      if (broadcast) {
        // (1) Legacy: host-window postMessage for speaker-notes renderers.
        try { window.postMessage({ slideIndexChanged: curr }, '*'); } catch (e) {}

        // (2) In-page CustomEvent on the <deck-stage> element itself.
        //     Bubbles and composes out of shadow DOM so slide code can listen:
        //       document.querySelector('deck-stage').addEventListener('slidechange', e => {
        //         e.detail.index, e.detail.previousIndex, e.detail.total, e.detail.slide, e.detail.reason
        //       });
        const detail = {
          index: curr,
          previousIndex: prev,
          total: this._slides.length,
          slide: this._slides[curr] || null,
          previousSlide: prev >= 0 ? (this._slides[prev] || null) : null,
          reason: reason, // 'init' | 'keyboard' | 'click' | 'tap' | 'api'
        };
        this.dispatchEvent(new CustomEvent('slidechange', {
          detail,
          bubbles: true,
          composed: true,
        }));
      }

      this._prevIndex = curr;
      if (showOverlay) this._flashOverlay();
    }

    _flashOverlay() {
      if (!this._overlay) return;
      this._overlay.setAttribute('data-visible', '');
      if (this._hideTimer) clearTimeout(this._hideTimer);
      this._hideTimer = setTimeout(() => {
        this._overlay.removeAttribute('data-visible');
      }, OVERLAY_HIDE_MS);
    }

    _fit() {
      if (!this._canvas) return;
      // PPTX export sets noscale so the DOM capture sees authored-size
      // geometry — the scaled canvas is in shadow DOM, so the exporter's
      // resetTransformSelector can't reach .canvas.style.transform directly.
      if (this.hasAttribute('noscale')) {
        this._canvas.style.transform = 'none';
        return;
      }
      const vw = window.innerWidth;
      const vh = window.innerHeight;
      const s = Math.min(vw / this.designWidth, vh / this.designHeight);
      this._canvas.style.transform = `scale(${s})`;
    }

    _onResize() { this._fit(); }

    _onMouseMove() {
      // Keep overlay visible while mouse moves; hide after idle.
      this._flashOverlay();
    }

    _onTapBack(e) {
      e.preventDefault();
      this._go(this._index - 1, 'tap');
    }

    _onTapForward(e) {
      e.preventDefault();
      this._go(this._index + 1, 'tap');
    }

    _onKey(e) {
      // Ignore when the user is typing.
      const t = e.target;
      if (t && (t.isContentEditable || /^(INPUT|TEXTAREA|SELECT)$/.test(t.tagName))) return;
      if (e.metaKey || e.ctrlKey || e.altKey) return;

      const key = e.key;
      let handled = true;

      if (key === 'ArrowRight' || key === 'PageDown' || key === ' ' || key === 'Spacebar') {
        this._go(this._index + 1, 'keyboard');
      } else if (key === 'ArrowLeft' || key === 'PageUp') {
        this._go(this._index - 1, 'keyboard');
      } else if (key === 'Home') {
        this._go(0, 'keyboard');
      } else if (key === 'End') {
        this._go(this._slides.length - 1, 'keyboard');
      } else if (key === 'r' || key === 'R') {
        this._go(0, 'keyboard');
      } else if (/^[0-9]$/.test(key)) {
        // 1..9 jump to that slide; 0 jumps to 10.
        const n = key === '0' ? 9 : parseInt(key, 10) - 1;
        if (n < this._slides.length) this._go(n, 'keyboard');
      } else {
        handled = false;
      }

      if (handled) {
        e.preventDefault();
        this._flashOverlay();
      }
    }

    _go(i, reason = 'api') {
      if (!this._slides.length) return;
      const clamped = Math.max(0, Math.min(this._slides.length - 1, i));
      if (clamped === this._index) {
        this._flashOverlay();
        return;
      }
      this._index = clamped;
      this._applyIndex({ showOverlay: true, broadcast: true, reason });
    }

    // Public API ------------------------------------------------------------

    /** Current slide index (0-based). */
    get index() { return this._index; }
    /** Total slide count. */
    get length() { return this._slides.length; }
    /** Programmatically navigate. */
    goTo(i) { this._go(i, 'api'); }
    next() { this._go(this._index + 1, 'api'); }
    prev() { this._go(this._index - 1, 'api'); }
    reset() { this._go(0, 'api'); }
  }

  if (!customElements.get('deck-stage')) {
    customElements.define('deck-stage', DeckStage);
  }
})();

    let left = 2 + ((i * 137.5) % 96);
    // push out of central 25..75% band

    const top = 2 + ((i * 73.3) % 92);
    const size = 28 + (i % 4) * 8;
    flakes.push(
      <div key={i} style={{
        position: "absolute",

        color: "rgba(255,255,255,0.55)",
        pointerEvents: "none",
      }} aria-hidden="true">❄</div>

};

<script type="text/babel" data-presets="react">/* ============== SLIDES — Milana's Maths Adventure ============== */
/* This file defines window.Slides — an array of slide-render functions. */

const Slides = [];

/* ---------- helper: column math digits ---------- */
function ColMath({ cols = 3, rows }) {
  // rows: array of { kind: 'top'|'bot'|'ans'|'carry'|'borrow'|'rule', op, digits }
  const style = { "--cols": cols };
  return (
    <div className="column-math" style={style}>
      {rows.map((row, i) => {
        if (row.kind === "rule") {
          return <div key={i} className="rule" />;
        }
        const cells = [];
        // op cell
        cells.push(<div key="op" className="op">{row.op || ""}</div>);
        // digit cells
        const colors = cols === 3 ? ["h", "t", "o"] : ["t", "o"];
        for (let c = 0; c < cols; c++) {
          const d = row.digits[c];
          if (d === undefined || d === null) {
            cells.push(<div key={c} className="digit ghost">0</div>);
          } else if (typeof d === "object") {
            // { val, strike, borrowed, color }
            const cls = ["digit", colors[c]];
            if (d.strike) cls.push("strike");
            cells.push(<div key={c} className={cls.join(" ")}>{d.val}</div>);
          } else {
            cells.push(<div key={c} className={`digit ${colors[c]} ${row.kind === "ans" ? "answer" : ""}`}>{d}</div>);
          }
        }
        if (row.kind === "carry" || row.kind === "borrow") {
          // small overlay row
          return (
            <React.Fragment key={i}>
              {cells.map((cell, idx) => {
                if (idx === 0) return <div key="op" className="op" />;
                const c = idx - 1;
                const d = row.digits[c];
                return (
                  <div key={c} className={row.kind === "carry" ? "carry-tiny" : "borrowed"}>
                    {d === undefined || d === null ? "" : (typeof d === "object" ? d.val : d)}
                  </div>
                );
              })}
            </React.Fragment>
          );
        }
        return <React.Fragment key={i}>{cells}</React.Fragment>;
      })}
    </div>
  );
}

function PVHeaders({ cols = 3 }) {
  return (
    <div className="pv-headers" style={{ "--cols": cols }}>
      <div></div>
      {cols === 3 && <div className="h-h">Hundreds</div>}
      <div className="h-t">Tens</div>
      <div className="h-o">Ones</div>
    </div>
  );
}
